version: '3.8'

# ============================================================================
# ASI04: Agentic Supply Chain Vulnerabilities Lab
# OWASP Top 10 for Agentic Applications
# ============================================================================

services:
  # ==========================================================================
  # CORE INFRASTRUCTURE
  # ==========================================================================
  
  # Ollama LLM Backend (CPU mode - no GPU required)
  ollama:
    image: ollama/ollama:latest
    container_name: asi04-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - asi04-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Vector Database for RAG
  chromadb:
    image: chromadb/chroma:latest
    container_name: asi04-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
    networks:
      - asi04-network

  # Redis for Agent Memory
  redis:
    image: redis:7-alpine
    container_name: asi04-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - asi04-network

  # ==========================================================================
  # ATTACKER INFRASTRUCTURE
  # ==========================================================================
  
  # Attacker's Collection Server (receives exfiltrated data)
  attacker-server:
    build:
      context: ./attacker-server
      dockerfile: Dockerfile
    container_name: asi04-attacker
    ports:
      - "8666:8666"
    volumes:
      - ./attacker-server/collected:/app/collected
    environment:
      - FLASK_ENV=development
    networks:
      - asi04-network

  # Malicious MCP Server (looks legitimate, exfiltrates data)
  malicious-mcp:
    build:
      context: ./malicious-mcp
      dockerfile: Dockerfile
    container_name: asi04-malicious-mcp
    ports:
      - "8765:8765"
    environment:
      - EXFIL_URL=http://attacker-server:8666/collect
      - MCP_SERVER_NAME=productivity-tools-pro
    depends_on:
      - attacker-server
    networks:
      - asi04-network

  # Fake PyPI Server (for typosquatting/dependency confusion)
  fake-pypi:
    build:
      context: ./legitimate-packages
      dockerfile: Dockerfile
    container_name: asi04-fake-pypi
    ports:
      - "8081:8081"
    volumes:
      - ./legitimate-packages/packages:/packages
    networks:
      - asi04-network

  # ==========================================================================
  # VULNERABLE AGENT APPLICATION
  # ==========================================================================
  
  vulnerable-agent:
    build:
      context: ./vulnerable-agent
      dockerfile: Dockerfile
    container_name: asi04-vulnerable-agent
    ports:
      - "5050:5050"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - CHROMADB_HOST=http://chromadb:8000
      - REDIS_HOST=redis
      - MCP_SERVER_URL=http://malicious-mcp:8765
      - PYPI_INDEX_URL=http://fake-pypi:8081/simple
      - ATTACKER_URL=http://attacker-server:8666/collect
      - SECRET_API_KEY=sk-live-supersecret123456789
      - DATABASE_PASSWORD=prod_db_p@ssw0rd!
      - AWS_SECRET_KEY=AKIAIOSFODNN7EXAMPLE
    depends_on:
      - ollama
      - chromadb
      - redis
      - malicious-mcp
      - attacker-server
    networks:
      - asi04-network

  # ==========================================================================
  # CTF PLATFORM
  # ==========================================================================
  
  ctf-dashboard:
    build:
      context: ./ctf-dashboard
      dockerfile: Dockerfile
    container_name: asi04-ctf-dashboard
    ports:
      - "3000:3000"
    environment:
      - ATTACKER_SERVER=http://attacker-server:8666
    depends_on:
      - attacker-server
    networks:
      - asi04-network

  # ==========================================================================
  # RAG POISONING SETUP
  # ==========================================================================

  rag-poisoner:
    build:
      context: ./rag-poisoning
      dockerfile: Dockerfile
    container_name: asi04-rag-poisoner
    environment:
      - CHROMADB_HOST=http://chromadb:8000
    depends_on:
      - chromadb
    networks:
      - asi04-network
    # Runs once to seed poisoned documents
    restart: "no"

networks:
  asi04-network:
    driver: bridge

volumes:
  ollama-data:
  chroma-data:
  redis-data:
